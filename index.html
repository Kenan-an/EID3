<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحدي التمثيل 🎭</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0D0D0D;
    --surface:  #161616;
    --card:     #1E1E1E;
    --red:      #E8323A;
    --red-glow: rgba(232,50,58,0.35);
    --gold:     #F5C518;
    --gold-dim: rgba(245,197,24,0.15);
    --green:    #22C55E;
    --green-glow: rgba(34,197,94,0.35);
    --white:    #F5F0E8;
    --muted:    #666;
    --radius:   22px;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px 48px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -20%; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(ellipse, rgba(232,50,58,0.12) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: repeating-linear-gradient(
      90deg, transparent, transparent 59px,
      rgba(255,255,255,0.015) 60px
    );
    pointer-events: none; z-index: 0;
  }

  .header {
    position: relative; z-index: 1;
    text-align: center;
    margin-bottom: 32px;
    animation: riseIn 0.7s cubic-bezier(.34,1.56,.64,1) both;
  }

  @keyframes riseIn {
    from { opacity: 0; transform: translateY(30px) scale(0.93); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .header-emoji {
    font-size: 64px; display: block; line-height: 1; margin-bottom: 10px;
    filter: drop-shadow(0 0 20px var(--red-glow));
    animation: pulse-emoji 3s ease-in-out infinite;
  }
  @keyframes pulse-emoji {
    0%, 100% { filter: drop-shadow(0 0 20px var(--red-glow)); }
    50%       { filter: drop-shadow(0 0 40px rgba(232,50,58,0.6)); }
  }

  .header h1 { font-size: 28px; font-weight: 900; color: var(--white); letter-spacing: 1px; line-height: 1.2; }
  .header h1 span { color: var(--red); }

  .card {
    position: relative; z-index: 1;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: var(--radius);
    width: 100%; max-width: 400px;
    padding: 28px 24px 32px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
    animation: riseIn 0.7s 0.1s cubic-bezier(.34,1.56,.64,1) both;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 32px; right: 32px; height: 3px;
    background: linear-gradient(90deg, transparent, var(--red), var(--gold), var(--red), transparent);
    border-radius: 0 0 4px 4px; opacity: 0.9;
  }

  .instruction {
    font-size: 15px; color: #999; line-height: 1.7;
    margin-bottom: 24px; padding: 14px 16px;
    background: rgba(255,255,255,0.04);
    border-radius: 12px; border-right: 3px solid var(--red);
  }

  .img-wrap {
    position: relative; border-radius: 16px; overflow: hidden;
    margin-bottom: 24px; background: #111;
    border: 1px solid rgba(255,255,255,0.06); min-height: 80px;
  }

  .img-placeholder {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 10px; padding: 48px 24px;
    color: var(--muted); font-size: 14px; font-weight: 700; transition: opacity 0.3s;
  }
  .img-placeholder .lock { font-size: 40px; }

  #challengeImg {
    width: 100%; display: block; border-radius: 14px;
    object-fit: cover; max-height: 280px;
    opacity: 0; transform: scale(1.04);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  #challengeImg.visible { opacity: 1; transform: scale(1); }

  .scan-line {
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, transparent, var(--red), var(--gold), var(--red), transparent);
    opacity: 0; pointer-events: none;
  }
  .scan-line.active { opacity: 1; animation: scanDown 0.7s ease-in-out forwards; }
  @keyframes scanDown {
    from { top: 0; opacity: 1; }
    to   { top: 100%; opacity: 0; }
  }

  /* ── TIMER ── */
  .timer-wrap {
    display: none;
    align-items: center; justify-content: center;
    margin-bottom: 24px;
  }
  .timer-wrap.visible { display: flex; animation: riseIn 0.4s ease both; }

  .timer-ring { position: relative; width: 120px; height: 120px; }
  .timer-svg  { width: 120px; height: 120px; transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: rgba(255,255,255,0.07); stroke-width: 7; }
  .ring-prog  {
    fill: none; stroke-width: 7; stroke-linecap: round;
    stroke: var(--red); stroke-dasharray: 314; stroke-dashoffset: 0;
    transition: stroke-dashoffset 0.9s linear, stroke 0.4s;
  }
  .timer-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .timer-num   { font-size: 38px; font-weight: 900; color: var(--white); line-height: 1; }
  .timer-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* ── BUTTONS ── */
  .btn {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; width: 100%; padding: 16px 20px; border: none;
    border-radius: 14px; font-family: 'Tajawal', sans-serif;
    font-size: 18px; font-weight: 700; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    margin-top: 8px; letter-spacing: 0.3px;
  }
  .btn:hover  { transform: translateY(-2px); }
  .btn:active { transform: scale(0.97); }

  .btn-start {
    background: linear-gradient(135deg, #E8323A, #B91C1C);
    color: white; box-shadow: 0 6px 30px var(--red-glow);
  }
  .btn-start:hover { box-shadow: 0 10px 40px rgba(232,50,58,0.5); }

  /* WIN button */
  .btn-win {
    background: linear-gradient(135deg, #22C55E, #15803D);
    color: white;
    box-shadow: 0 6px 30px var(--green-glow);
    display: none;
  }
  .btn-win.visible { display: flex; animation: riseIn 0.4s ease both; }
  .btn-win:hover { box-shadow: 0 10px 40px rgba(34,197,94,0.5); }

  /* ── BANNERS ── */
  .done-banner, .win-banner {
    display: none; text-align: center;
    padding: 20px 16px; border-radius: 14px;
    margin-bottom: 8px;
  }

  .done-banner {
    background: var(--gold-dim);
    border: 1px solid rgba(245,197,24,0.3);
  }
  .done-banner.visible { display: block; animation: riseIn 0.4s ease both; }
  .done-banner .done-emoji { font-size: 48px; display: block; margin-bottom: 6px; }
  .done-banner .done-text  { font-size: 20px; font-weight: 900; color: var(--gold); }
  .done-banner .done-sub   { font-size: 13px; color: #999; margin-top: 4px; }

  .win-banner {
    background: rgba(34,197,94,0.1);
    border: 1px solid rgba(34,197,94,0.35);
  }
  .win-banner.visible { display: block; animation: riseIn 0.4s ease both; }
  .win-banner .win-emoji { font-size: 64px; display: block; margin-bottom: 8px; animation: spinIn 0.6s cubic-bezier(.34,1.56,.64,1) both; }
  @keyframes spinIn {
    from { transform: scale(0) rotate(-180deg); opacity: 0; }
    to   { transform: scale(1) rotate(0);      opacity: 1; }
  }
  .win-banner .win-text { font-size: 24px; font-weight: 900; color: var(--green); }
  .win-banner .win-sub  { font-size: 14px; color: #aaa; margin-top: 6px; line-height: 1.6; }

  /* lose banner */
  .lose-banner {
    display: none; text-align: center;
    padding: 20px 16px; border-radius: 14px;
    margin-bottom: 8px;
    background: rgba(232,50,58,0.1);
    border: 1px solid rgba(232,50,58,0.3);
  }
  .lose-banner.visible { display: block; animation: riseIn 0.4s ease both; }
  .lose-banner .lose-emoji { font-size: 56px; display: block; margin-bottom: 8px; }
  .lose-banner .lose-text  { font-size: 22px; font-weight: 900; color: var(--red); }
  .lose-banner .lose-sub   { font-size: 13px; color: #999; margin-top: 4px; line-height: 1.6; }

  /* yes/no row */
  .yesno-wrap {
    display: none;
    gap: 10px;
    margin-top: 8px;
  }
  .yesno-wrap.visible { display: flex; animation: riseIn 0.4s ease both; }
  .btn-yes {
    flex: 1;
    background: linear-gradient(135deg, #22C55E, #15803D);
    color: white; box-shadow: 0 6px 24px var(--green-glow);
  }
  .btn-no {
    flex: 1;
    background: linear-gradient(135deg, #E8323A, #B91C1C);
    color: white; box-shadow: 0 6px 24px var(--red-glow);
  }

</style>
</head>
<body>

<header class="header">
  <span class="header-emoji">🎭</span>
  <h1>تحدي <span>التمثيل</span></h1>
</header>

<div class="card">

  <div class="instruction">
    راح تشرحي الشخصية اللي بتجيك بالحركات بس، ممنوع الكلام! 😆
  </div>

  <div class="img-wrap" id="imgWrap">
    <div class="img-placeholder" id="imgPlaceholder">
      <span class="lock">🔒</span>
      اضغط ابدأ عشان تشوف التحدي
    </div>
    <div class="scan-line" id="scanLine"></div>
    <img id="challengeImg" src="challenge.jpg" alt="تحدي التمثيل">
  </div>

  <div class="timer-wrap" id="timerWrap">
    <div class="timer-ring">
      <svg class="timer-svg" viewBox="0 0 120 120">
        <circle class="ring-track" cx="60" cy="60" r="50"/>
        <circle class="ring-prog"  cx="60" cy="60" r="50" id="ringProg"/>
      </svg>
      <div class="timer-center">
        <div class="timer-num" id="timerNum">60</div>
        <div class="timer-label">ثانية</div>
      </div>
    </div>
  </div>

  <!-- Time's up banner -->
  <div class="done-banner" id="doneBanner">
    <span class="done-emoji">⏰</span>
    <div class="done-text">انتهى الوقت!</div>
    <div class="done-sub">هل خمنوا الإجابة؟ 😄</div>
  </div>

  <!-- Yes / No buttons after time's up -->
  <div class="yesno-wrap" id="yesnoWrap">
    <button class="btn btn-yes" onclick="onAnswer(true)">✅ ايوا خمنوها</button>
    <button class="btn btn-no"  onclick="onAnswer(false)">❌ لا ما خمنوها</button>
  </div>

  <!-- Win / congrats banner -->
  <div class="win-banner" id="winBanner">
    <span class="win-emoji">🏆</span>
    <div class="win-text">مبروووك! فزتوا! 🎉</div>
    <div class="win-sub">أثبتتوا إنكم فنانين من الطراز الأول 🌟</div>
  </div>

  <!-- Lose banner -->
  <div class="lose-banner" id="loseBanner">
    <span class="lose-emoji">😅</span>
    <div class="lose-text">للأسف ما خمنوها!</div>
    <div class="lose-sub">المرة الجاية إن شاء الله 💪</div>
  </div>

  <!-- Start button -->
  <button class="btn btn-start" id="startBtn" onclick="startChallenge()">
    🎬 ابدأ التحدي
  </button>

  <!-- Win button — shown after challenge starts -->
  <button class="btn btn-win" id="winBtn" onclick="onWin()">
    ✅ صح! خمنوها
  </button>

</div>

<script>
  const DURATION = 60;
  const CIRCUM   = 314;
  let timerInterval = null;

  function startChallenge() {
    if (timerInterval) return;

    const ph   = document.getElementById('imgPlaceholder');
    const img  = document.getElementById('challengeImg');
    const scan = document.getElementById('scanLine');

    ph.style.opacity = '0';
    scan.classList.add('active');
    setTimeout(() => {
      ph.style.display = 'none';
      img.classList.add('visible');
    }, 400);

    document.getElementById('startBtn').style.display = 'none';

    document.getElementById('timerWrap').classList.add('visible');

    // Show win button
    document.getElementById('winBtn').classList.add('visible');

    let left = DURATION;
    const numEl = document.getElementById('timerNum');
    const prog  = document.getElementById('ringProg');

    numEl.textContent = left;
    prog.style.strokeDashoffset = 0;

    timerInterval = setInterval(() => {
      left--;
      numEl.textContent = left;

      const ratio = left / DURATION;
      prog.style.strokeDashoffset = CIRCUM * (1 - ratio);

      if (ratio < 0.33)     prog.style.stroke = '#EF4444';
      else if (ratio < 0.6) prog.style.stroke = '#F59E0B';
      else                  prog.style.stroke = '#E8323A';

      if (left <= 0) {
        clearInterval(timerInterval);
        timerInterval = null;
        onTimeUp();
      }
    }, 1000);
  }

  function onTimeUp() {
    document.getElementById('timerWrap').classList.remove('visible');
    document.getElementById('winBtn').classList.remove('visible');
    document.getElementById('doneBanner').classList.add('visible');
    document.getElementById('yesnoWrap').classList.add('visible');
  }

  function onAnswer(won) {
    document.getElementById('doneBanner').classList.remove('visible');
    document.getElementById('yesnoWrap').classList.remove('visible');
    if (won) {
      document.getElementById('winBanner').classList.add('visible');
      launchConfetti();
    } else {
      document.getElementById('loseBanner').classList.add('visible');
    }
  }

  function onWin() {
    clearInterval(timerInterval);
    timerInterval = null;
    document.getElementById('timerWrap').classList.remove('visible');
    document.getElementById('winBtn').classList.remove('visible');
    document.getElementById('winBanner').classList.add('visible');
    launchConfetti();
  }

  /* ── CONFETTI ── */
  function launchConfetti() {
    const canvas = document.createElement('canvas');
    canvas.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:999';
    document.body.appendChild(canvas);
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const cols = ['#E8323A','#F5C518','#22C55E','#3B82F6','#F97316','#F5F0E8'];
    const pieces = Array.from({ length: 120 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * -canvas.height,
      w: 6 + Math.random() * 10, h: 4 + Math.random() * 6,
      r: Math.random() * Math.PI * 2, dr: (Math.random() - 0.5) * 0.15,
      dy: 2.5 + Math.random() * 4, dx: (Math.random() - 0.5) * 1.5,
      color: cols[Math.floor(Math.random() * cols.length)]
    }));
    let frame;
    const draw = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pieces.forEach(p => {
        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.r);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.restore();
        p.y += p.dy; p.x += p.dx; p.r += p.dr;
      });
      if (pieces.some(p => p.y < canvas.height + 20)) frame = requestAnimationFrame(draw);
      else { ctx.clearRect(0,0,canvas.width,canvas.height); canvas.remove(); }
    };
    draw();
    setTimeout(() => { cancelAnimationFrame(frame); canvas.remove(); }, 5000);
  }
</script>
</body>
</html>
